<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox User ID Tester (Hyra + Multi-Proxy Fix)</title>
    <style>
        body { font-family: sans-serif; margin: 2rem; max-width: 600px; }
        input, button { padding: 0.5rem; font-size: 1rem; margin-bottom: 0.5rem; border-radius: 4px; border: 1px solid #ccc; }
        button { cursor: pointer; background-color: #f0f0f0; }
        button:hover { background-color: #e0e0e0; }
        .action-btn { background-color: #007bff; color: white; border: none; }
        .action-btn:hover { background-color: #0056b3; }
        #result-container { margin-top: 1rem; font-weight: bold; display: flex; align-items: center; gap: 10px; }
        .copy-btn { padding: 0.3rem 0.6rem; font-size: 0.85rem; display: none; }
        .setup-section { margin-top: 2rem; border-top: 1px solid #ccc; padding-top: 1rem; }
    </style>
</head>
<body>

    <h1>Roblox User ID Finder</h1>
    <input type="text" id="username" placeholder="Enter Roblox Username">
    <button class="action-btn" onclick="testUser()">Get ID</button>

    <div id="result-container">
        <span id="result"></span>
        <button id="copyIdBtn" class="copy-btn" onclick="copyIdToClipboard()">Copy ID</button>
    </div>

    <div class="setup-section">
        <h3>Developer Export</h3>
        <p>Need the clean fetch code for your secure backend (Node.js/Python) where CORS limitations don't apply?</p>
        <button class="action-btn" id="copyCodeBtn" onclick="copyCleanCode()">Copy Clean JS Code</button>
    </div>

    <script>
        let currentUserId = "";

        // Backend code snippet without proxies
        const cleanJavaScriptCode = `async function getUserID(name) {
    const targetUrl = \`https://api.hyra.io/users/roblox?username=\${encodeURIComponent(name.trim())}\`;
    const response = await fetch(targetUrl, {
        method: 'GET',
        headers: { 'Accept': 'application/json' }
    });
    
    if (!response.ok) throw new Error("Network error fetching user data.");
    const data = await response.json();
    if (!data || !data.id) throw new Error("User not found.");
    return data.id;
}`;

        // Robust client-side fetch utilizing proxy fallbacks
        async function getUserID(name) {
            const targetUrl = `https://api.hyra.io/users/roblox?username=${encodeURIComponent(name.trim())}`;
            
            // Primary and secondary CORS proxies configured with correct parameter layouts
            const proxyPool = [
                `https://corsproxy.io/?url=${encodeURIComponent(targetUrl)}`,
                `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`
            ];

            for (let i = 0; i < proxyPool.length; i++) {
                try {
                    const response = await fetch(proxyPool[i], { method: 'GET' });
                    
                    // Explicitly capture 404 (User doesn't exist) so we don't cycle proxies pointlessly
                    if (response.status === 404) {
                        throw new Error("User not found on Roblox.");
                    }
                    
                    // Skip to the next proxy if a 500 error or rate limit occurs
                    if (!response.ok) continue; 
                    
                    const data = await response.json();
                    if (data && data.id) {
                        return data.id;
                    }
                } catch (error) {
                    if (error.message === "User not found on Roblox.") {
                        throw error;
                    }
                    // If we've exhausted all options, throw an aggregate error
                    if (i === proxyPool.length - 1) {
                        throw new Error("Public CORS proxies are down or throttling requests. Try again in a moment.");
                    }
                }
            }
        }

        async function testUser() {
            const name = document.getElementById('username').value;
            const resultDiv = document.getElementById('result');
            const copyIdBtn = document.getElementById('copyIdBtn');
            
            // Reset UI state
            currentUserId = "";
            copyIdBtn.style.display = "none";
            copyIdBtn.textContent = "Copy ID";
            
            if (!name) {
                resultDiv.textContent = "Please enter a username.";
                return;
            }

            resultDiv.textContent = "Loading...";
            
            try {
                const id = await getUserID(name);
                currentUserId = id;
                resultDiv.textContent = `User ID: ${id}`;
                copyIdBtn.style.display = "inline-block"; 
            } catch (error) {
                resultDiv.textContent = `Error: ${error.message}`;
                console.error(error);
            }
        }

        function copyIdToClipboard() {
            if (!currentUserId) return;
            navigator.clipboard.writeText(currentUserId).then(() => {
                const btn = document.getElementById('copyIdBtn');
                btn.textContent = "Copied!";
                setTimeout(() => { btn.textContent = "Copy ID"; }, 2000);
            });
        }

        document.getElementById('copyCodeBtn').onclick = function() {
            navigator.clipboard.writeText(cleanJavaScriptCode).then(() => {
                const btn = document.getElementById('copyCodeBtn');
                btn.textContent = "Code Copied!";
                setTimeout(() => { btn.textContent = "Copy Clean JS Code"; }, 2000);
            });
        }
    </script>

</body>
</html>
