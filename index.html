<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox User ID Tester</title>
    <style>
        body { font-family: sans-serif; margin: 2rem; max-width: 600px; }
        input, button { padding: 0.5rem; font-size: 1rem; margin-bottom: 0.5rem; border-radius: 4px; border: 1px solid #ccc; }
        button { cursor: pointer; background-color: #f0f0f0; }
        button:hover { background-color: #e0e0e0; }
        .action-btn { background-color: #007bff; color: white; border: none; }
        .action-btn:hover { background-color: #0056b3; }
        #result-container { margin-top: 1rem; font-weight: bold; display: flex; align-items: center; gap: 10px; }
        .copy-btn { padding: 0.3rem 0.6rem; font-size: 0.85rem; display: none; }
        .setup-section { margin-top: 2rem; border-top: 1px solid #ccc; padding-top: 1rem; }
        .code-box { background: #f8f9fa; padding: 1rem; border-left: 4px solid #007bff; margin-top: 1rem; font-family: monospace; font-size: 0.9rem; white-space: pre-wrap; }
    </style>
</head>
<body>

    <h1>Roblox User ID Finder</h1>
    <input type="text" id="username" placeholder="Enter Roblox Username">
    <button class="action-btn" onclick="testUser()">Get ID</button>

    <!-- Result Area with inline Copy ID button -->
    <div id="result-container">
        <span id="result"></span>
        <button id="copyIdBtn" class="copy-btn" onclick="copyIdToClipboard()">Copy ID</button>
    </div>

    <!-- Proxy Setup Section -->
    <div class="setup-section">
        <h3>Proxy Authorization</h3>
        <p>If you get a CORS error, request temporary demo access:</p>
        <button onclick="window.open('https://cors-anywhere.herokuapp.com/corsdemo', '_blank')">
            Request CORS-Anywhere Access
        </button>
    </div>

    <!-- Clean Code Export Section -->
    <div class="setup-section">
        <h3>Developer Export</h3>
        <p>Need the clean fetch code for your backend (Node.js/Serverless) without the CORS proxy?</p>
        <button class="action-btn" id="copyCodeBtn" onclick="copyCleanCode()">Copy Clean JS Code</button>
    </div>

    <script>
        let currentUserId = "";

        // The JS fetch code snippet without the cors-anywhere proxy link
        const cleanJavaScriptCode = `async function getUserID(name) {
    const targetUrl = 'https://users.roblox.com/v1/usernames/users';
    const response = await fetch(targetUrl, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json'
        },
        body: JSON.stringify({
            "usernames": [name.trim()],
            "excludeBannedUsers": false
        })
    });
    
    if (!response.ok) throw new Error("Network error fetching user data.");
    const data = await response.json();
    if (!data.data || data.data.length === 0) throw new Error("User not found.");
    return data.data[0].id;
}`;

        async function getUserID(name) {
            const proxyUrl = 'https://cors-anywhere.herokuapp.com/';
            const targetUrl = 'https://users.roblox.com/v1/usernames/users';
            
            const response = await fetch(proxyUrl + targetUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify({
                    "usernames": [name.trim()],
                    "excludeBannedUsers": false
                })
            });
            
            if (!response.ok) {
                throw new Error("Network error or CORS access not enabled.");
            }
            
            const data = await response.json();
            
            if (!data.data || data.data.length === 0) {
                throw new Error("User not found. Check the spelling of the username.");
            }
            
            return data.data[0].id;
        }

        async function testUser() {
            const name = document.getElementById('username').value;
            const resultDiv = document.getElementById('result');
            const copyIdBtn = document.getElementById('copyIdBtn');
            
            // Reset state
            currentUserId = "";
            copyIdBtn.style.display = "none";
            copyIdBtn.textContent = "Copy ID";
            
            if (!name) {
                resultDiv.textContent = "Please enter a username.";
                return;
            }

            resultDiv.textContent = "Loading...";
            
            try {
                const id = await getUserID(name);
                currentUserId = id;
                resultDiv.textContent = `User ID: ${id}`;
                copyIdBtn.style.display = "inline-block"; // Show copy button on success
            } catch (error) {
                resultDiv.textContent = `Error: ${error.message}`;
                console.error(error);
            }
        }

        // Action: Copies the retrieved numeric User ID to clipboard
        function copyIdToClipboard() {
            if (!currentUserId) return;
            navigator.clipboard.writeText(currentUserId).then(() => {
                const btn = document.getElementById('copyIdBtn');
                btn.textContent = "Copied!";
                setTimeout(() => { btn.textContent = "Copy ID"; }, 2000);
            });
        }

        // Action: Copies the production-ready JS block without the proxy URL
        function copyCleanCode() {
            navigator.clipboard.writeText(cleanJavaScriptCode).then(() => {
                const btn = document.getElementById('copyCodeBtn');
                btn.textContent = "Code Copied!";
                setTimeout(() => { btn.textContent = "Copy Clean JS Code"; }, 2000);
            });
        }
    </script>

</body>
</html>
