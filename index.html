<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox User ID Tester</title>
    <style>
        body { font-family: sans-serif; margin: 2rem; }
        input, button { padding: 0.5rem; font-size: 1rem; margin-bottom: 0.5rem; }
        #result { margin-top: 1rem; font-weight: bold; }
        .setup-section { margin-top: 2rem; border-top: 1px solid #ccc; padding-top: 1rem; }
    </style>
</head>
<body>

    <h1>Roblox User ID Finder</h1>
    <input type="text" id="username" placeholder="Enter Roblox Username">
    <button onclick="testUser()">Get ID</button>

    <div id="result"></div>

    <div class="setup-section">
        <h3>First Time User?</h3>
        <p>If you get a CORS error, you must authorize your IP address with the proxy service first.</p>
        <button onclick="window.open('https://cors-anywhere.herokuapp.com/corsdemo', '_blank')">
            Request CORS-Anywhere Access
        </button>
    </div>

    <script>
        async function getUserID(name) {
            const proxyUrl = 'https://cors-anywhere.herokuapp.com/';
            // Trim whitespace just in case there are accidental spaces
            const cleanName = name.trim();
            const targetUrl = `https://www.roblox.com/users/profile?username=${cleanName}`;
            
            const response = await fetch(proxyUrl + targetUrl);
            
            if (!response.ok) throw new Error("CORS access not enabled or network error.");
            
            // Look for the specific /users/ID/ pattern in the final URL
            const match = response.url.match(/\/users\/(\d+)/);
            
            // If no match is found, they typed a username that doesn't exist
            if (!match) {
                throw new Error("User not found. Check the spelling of the username.");
            }
            
            // match[1] holds the isolated ID number
            return match[1];
        }

        async function testUser() {
            const name = document.getElementById('username').value;
            const resultDiv = document.getElementById('result');
            
            if (!name) {
                resultDiv.textContent = "Please enter a username.";
                return;
            }

            resultDiv.textContent = "Loading...";
            
            try {
                const id = await getUserID(name);
                resultDiv.textContent = `User ID: ${id}`;
            } catch (error) {
                // Displays the specific error message we threw above
                resultDiv.textContent = `Error: ${error.message}`;
                console.error(error);
            }
        }
    </script>

</body>
</html>
