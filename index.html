<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Roblox User ID Tester (Restricted Proxies)</title>
    <style>
        body { font-family: sans-serif; margin: 2rem; max-width: 600px; line-height: 1.4; }
        .form-group { margin-bottom: 1rem; display: flex; flex-direction: column; gap: 0.25rem; }
        label { font-weight: bold; font-size: 0.9rem; color: #333; }
        input, select, button { padding: 0.6rem; font-size: 1rem; border-radius: 4px; border: 1px solid #ccc; width: 100%; box-sizing: border-box; }
        input, select { margin-bottom: 0.5rem; }
        button { cursor: pointer; background-color: #f0f0f0; transition: background 0.2s; }
        button:hover { background-color: #e0e0e0; }
        .action-btn { background-color: #007bff; color: white; border: none; font-weight: bold; }
        .action-btn:hover { background-color: #0056b3; }
        #result-container { margin-top: 1.5rem; font-weight: bold; display: flex; align-items: center; gap: 10px; min-height: 40px; }
        .copy-btn { padding: 0.4rem 0.8rem; font-size: 0.85rem; display: none; width: auto; }
        .setup-section { margin-top: 2rem; border-top: 1px solid #ccc; padding-top: 1rem; }
        .note { font-size: 0.85rem; color: #666; margin-top: -0.25rem; margin-bottom: 0.5rem; display: none; }
    </style>
</head>
<body>

    <h1>Roblox User ID Finder</h1>
    
    <div class="form-group">
        <label for="apiSelect">Target API Endpoint</label>
        <select id="apiSelect" onchange="updateProxyOptions()">
            <option value="hyra">Hyra API (GET Request)</option>
            <option value="roblox">Roblox Native API (POST Request)</option>
        </select>
    </div>

    <div class="form-group">
        <label for="proxySelect">CORS Proxy Layer</label>
        <select id="proxySelect" onchange="toggleProxyNotice()">
            </select>
        <div id="corsAnywhereNote" class="note">
            ⚠️ <strong>Notice:</strong> If using cors-anywhere, make sure you have requested temporary access by opening 
            <a href="https://cors-anywhere.herokuapp.com/corsdemo" target="_blank">the Demo Room</a> in another tab.
        </div>
    </div>

    <div class="form-group" style="margin-top: 1.5rem;">
        <label for="username">Roblox Username</label>
        <input type="text" id="username" placeholder="Enter Username (e.g. zzzvctt)">
        <button class="action-btn" onclick="testUser()">Fetch User ID</button>
    </div>

    <div id="result-container">
        <span id="result"></span>
        <button id="copyIdBtn" class="copy-btn" onclick="copyIdToClipboard()">Copy ID</button>
    </div>

    <div class="setup-section">
        <h3>Backend Code Generator</h3>
        <p>Grab the direct, proxy-free script optimized for server deployment environments (Node.js/Serverless pipelines):</p>
        <button class="action-btn" id="copyCodeBtn" onclick="copyCleanCode()">Copy Clean JS Code</button>
    </div>

    <script>
        let currentUserId = "";

        // Dynamically shift allowed proxy options based on your strict API constraints
        function updateProxyOptions() {
            const apiChoice = document.getElementById('apiSelect').value;
            const proxySelect = document.getElementById('proxySelect');
            
            // Clear current options
            proxySelect.innerHTML = "";

            if (apiChoice === "hyra") {
                // For Hyra: Only allow api.allorigins
                const opt1 = document.createElement("option");
                opt1.value = "allorigins";
                opt1.textContent = "api.allorigins.win (Raw Parsing Mode Wrapper)";
                proxySelect.appendChild(opt1);
            } else if (apiChoice === "roblox") {
                // For Roblox: Only allow corsproxy.io or cors-anywhere
                const opt1 = document.createElement("option");
                opt1.value = "corsproxy";
                opt1.textContent = "corsproxy.io (Stable URL Parameter Wrapper)";
                proxySelect.appendChild(opt1);

                const opt2 = document.createElement("option");
                opt2.value = "corsanywhere";
                opt2.textContent = "cors-anywhere.herokuapp.com (Requires Manual Activation)";
                proxySelect.appendChild(opt2);
            }

            // Always provide a direct/none fallback for testing
            const optNone = document.createElement("option");
            optNone.value = "none";
            optNone.textContent = "None / Direct Connection (Will fail in browser)";
            proxySelect.appendChild(optNone);

            // Update UI notices
            toggleProxyNotice();
        }

        // UI Utility: Warn user when choosing cors-anywhere
        function toggleProxyNotice() {
            const proxy = document.getElementById('proxySelect').value;
            document.getElementById('corsAnywhereNote').style.display = (proxy === 'corsanywhere') ? 'block' : 'none';
        }

        // Generates clean source code dynamically depending on which configurations are currently checked
        function generateCleanCodeSnippet(apiType) {
            if (apiType === 'hyra') {
                return `async function getUserID(name) {
    const targetUrl = \`https://api.hyra.io/users/roblox?username=\${encodeURIComponent(name.trim())}\`;
    const response = await fetch(targetUrl, {
        method: 'GET',
        headers: { 'Accept': 'application/json' }
    });
    
    if (!response.ok) throw new Error("Network error fetching user data.");
    const data = await response.json();
    if (!data || !data.id) throw new Error("User not found.");
    return data.id;
}`;
            } else {
                return `async function getUserID(name) {
    const targetUrl = 'https://users.roblox.com/v1/usernames/users';
    const response = await fetch(targetUrl, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json'
        },
        body: JSON.stringify({
            "usernames": [name.trim()],
            "excludeBannedUsers": false
        })
    });
    
    if (!response.ok) throw new Error("Network error fetching user data.");
    const data = await response.json();
    if (!data.data || data.data.length === 0) throw new Error("User not found.");
    return data.data[0].id;
}`;
            }
        }

        // Primary dynamic engine orchestration execution
        async function getUserID(name) {
            const apiChoice = document.getElementById('apiSelect').value;
            const proxyChoice = document.getElementById('proxySelect').value;
            const trimmedName = name.trim();

            let targetUrl = "";
            let fetchOptions = {};

            // 1. Structure Endpoint Payloads Base Setup
            if (apiChoice === 'hyra') {
                targetUrl = `https://api.hyra.io/users/roblox?username=${encodeURIComponent(trimmedName)}`;
                fetchOptions = {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' }
                };
            } else {
                targetUrl = 'https://users.roblox.com/v1/usernames/users';
                fetchOptions = {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        "usernames": [trimmedName],
                        "excludeBannedUsers": false
                    })
                };
            }

            // 2. Wrap Request Processing through Selected Proxy Architecture
            let finalUrl = targetUrl;
            if (proxyChoice === 'corsproxy') {
                finalUrl = `https://corsproxy.io/?url=${encodeURIComponent(targetUrl)}`;
            } else if (proxyChoice === 'allorigins') {
                finalUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`;
            } else if (proxyChoice === 'corsanywhere') {
                finalUrl = `https://cors-anywhere.herokuapp.com/${targetUrl}`;
                fetchOptions.headers = { ...fetchOptions.headers, 'X-Requested-With': 'XMLHttpRequest' };
            }

            // 3. Dispatch Network Call
            const response = await fetch(finalUrl, fetchOptions);
            
            if (!response.ok) {
                if (response.status === 403 && proxyChoice === 'corsanywhere') {
                    throw new Error("Access Denied by Proxy. Did you register your session with the Demo Room activation page?");
                }
                if (response.status === 404) {
                    throw new Error("Target resource or user account details returned a 404 mismatch error.");
                }
                throw new Error(`Server feedback execution error occurred (Status code: ${response.status}).`);
            }

            const data = await response.json();

            // 4. Custom Object Architecture Parser
            if (apiChoice === 'hyra') {
                if (!data || !data.id) throw new Error("User query not found. Confirm spelling string values.");
                return data.id;
            } else {
                if (!data.data || data.data.length === 0) throw new Error("User query not found. Confirm spelling string values.");
                return data.data[0].id;
            }
        }

        async function testUser() {
            const name = document.getElementById('username').value;
            const resultDiv = document.getElementById('result');
            const copyIdBtn = document.getElementById('copyIdBtn');
            
            currentUserId = "";
            copyIdBtn.style.display = "none";
            copyIdBtn.textContent = "Copy ID";
            
            if (!name) {
                resultDiv.textContent = "Please enter a username.";
                return;
            }

            resultDiv.textContent = "Processing network pipeline execution...";
            
            try {
                const id = await getUserID(name);
                currentUserId = id;
                resultDiv.textContent = `User ID: ${id}`;
                copyIdBtn.style.display = "inline-block"; 
            } catch (error) {
                resultDiv.textContent = `Error Encountered: ${error.message}`;
                console.error(error);
            }
        }

        function copyIdToClipboard() {
            if (!currentUserId) return;
            navigator.clipboard.writeText(currentUserId).then(() => {
                const btn = document.getElementById('copyIdBtn');
                btn.textContent = "Copied!";
                setTimeout(() => { btn.textContent = "Copy ID"; }, 2000);
            });
        }

        function copyCleanCode() {
            const apiChoice = document.getElementById('apiSelect').value;
            const codeText = generateCleanCodeSnippet(apiChoice);
            navigator.clipboard.writeText(codeText).then(() => {
                const btn = document.getElementById('copyCodeBtn');
                btn.textContent = "Code Configuration Copied!";
                setTimeout(() => { btn.textContent = "Copy Clean JS Code"; }, 2000);
            });
        }

        // Initialize the proxy drop-down selections correctly on script startup
        window.onload = function() {
            updateProxyOptions();
        };
    </script>

</body>
</html>
